---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: healthtracking
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '2'
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/enicky/cluster-template2.git"
      path: kubernetes/apps/home/healthtracking
      targetRevision: main
      ref: repo
    - repoURL: ghcr.io/bjw-s-labs/helm
      chart: app-template
      targetRevision: 4.6.2
      helm:
        releaseName: healthtracking
        valueFiles:
          - $repo/kubernetes/apps/home/healthtracking/values.yaml
  destination:
    name: in-cluster
    namespace: home
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
    - CreateNamespace=true
