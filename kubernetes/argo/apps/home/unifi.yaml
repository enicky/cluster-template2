---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: unifi
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/enicky/cluster-template2.git"
      path: kubernetes/apps/home/unifi
      targetRevision: main
  destination:
    name: in-cluster
    namespace: home
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
