---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mosquitto
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: kubernetes
  sources:
    - repoURL: "https://github.com/enicky/cluster-template2.git"
      path: kubernetes/apps/network/mqtt
      targetRevision: main
      ref: repo
      helm:
        releaseName: mosquitto
        valuesObject:
          replicaCount: 1
          image:
            repository: eclipse-mosquitto
            tag: latest
          podAnnotations:
            lbipam.cilium.io/ips: "192.168.1.26"
          service:
            type: LoadBalancer
            port: 1833


  destination:
    name: in-cluster
    namespace: network
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
