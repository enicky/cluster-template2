apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./rbac.yaml

patchesJson6902:
  - target:
      group: ""
      version: v1
      kind: ConfigMap
      name: envoy-gateway-config
      namespace: network
    patch: |-
      - op: replace
        path: /data/envoy-gateway.yaml
        value: |
          apiVersion: gateway.envoyproxy.io/v1alpha1
          kind: EnvoyGateway
          provider:
            type: Kubernetes
            kubernetes:
              envoyDeployment:
                container:
                  env:
                  - name: GOGC
                    value: "80"
                  resources:
                    limits:
                      cpu: 2000m
                      memory: 1Gi
                    requests:
                      cpu: 100m
                      memory: 40Mi
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    runAsNonRoot: true
                    runAsUser: 65534
              envoyService:
                type: LoadBalancer
              watch:
                Namespaces:
                - home
                - kube-system
                - longhorn-system
                - monitoring
                - network
          gateway:
            controllerName: gateway.envoyproxy.io/gatewayclass-controller
          extensionApis:
            enableBackend: true
          logging:
            level:
              default: info
            management: null
