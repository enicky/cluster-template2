apiVersion: v1
kind: Service
metadata:
  name: local-dns
  namespace: network
  annotations:
    io.cilium/lb-ipam-ips: "192.168.1.22"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: local-dns
  ports:
  - port: 53
    protocol: UDP
    name: dns
  - port: 53
    protocol: TCP
    name: dns-tcp
  externalTrafficPolicy: Cluster
