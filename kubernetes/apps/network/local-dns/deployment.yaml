apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-dns
  namespace: network
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: local-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: local-dns
    spec:
      serviceAccountName: local-dns
      containers:
      - name: coredns
        image: coredns/coredns:1.14.2
        args:
          - -conf
          - /etc/coredns/Corefile
        ports:
        - containerPort: 53
          name: dns
          protocol: UDP
        - containerPort: 53
          name: dns-tcp
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/coredns
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: local-dns-coredns
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: local-dns
  namespace: network
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-dns
rules:
- apiGroups:
  - ""
  resources:
  - endpoints
  - services
  - pods
  - namespaces
  verbs:
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
- apiGroups:
  - discovery.k8s.io
  resources:
  - endpointslices
  verbs:
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: local-dns
subjects:
- kind: ServiceAccount
  name: local-dns
  namespace: network
