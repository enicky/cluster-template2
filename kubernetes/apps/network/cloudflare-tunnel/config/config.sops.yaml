---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflare-tunnel-configmap
data:
  config.yaml: |
    ---
    originRequest:
      originServerName: "external.gitlab.be"

    ingress:
      - hostname: "gitlab.be"
        service: &svc https://envoy-external.network.svc.cluster.local
      - hostname: "*.gitlab.be"
        service: *svc
      - service: http_status:404
