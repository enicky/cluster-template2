---
# Source: mqtt/templates/pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-mqtt
  namespace: network
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20M
---
# Source: mqtt/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  namespace: network
  name: mosquitto-mqtt
  labels:
    helm.sh/chart: mqtt-0.1.0
    app.kubernetes.io/name: mqtt
    app.kubernetes.io/instance: mosquitto
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
      lbipam.cilium.io/ips: 192.168.1.26

spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  ports:
  - name: port1883
    protocol: TCP
    port: 1883
    targetPort: 1883
  selector:
    app: mqtt
---
# Source: mqtt/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto-mqtt
  namespace: 
  labels:
    helm.sh/chart: mqtt-0.1.0
    app.kubernetes.io/name: mqtt
    app.kubernetes.io/instance: mosquitto
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mqtt
      app.kubernetes.io/instance: mosquitto
  template:
    metadata:
      annotations:
        lbipam.cilium.io/ips: 192.168.1.26
      labels:
        helm.sh/chart: mqtt-0.1.0
        app.kubernetes.io/name: mqtt
        app.kubernetes.io/instance: mosquitto
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
        app: mqtt
    spec:
      securityContext:
        fsGroup: 1883
        runAsGroup: 1883
        runAsNonRoot: true
        runAsUser: 1833
      containers:
        - name: mqtt
          securityContext:
            {}
          image: "eclipse-mosquitto:latest"
          imagePullPolicy: IfNotPresent
          #restartPolicy: Always
          ports:
            - containerPort: 1883
            - containerPort: 9001
          resources:
            {}
          volumeMounts:
            - mountPath: /mosquitto/config
              name: config-file
            - mountPath: /mosquitto/data
              name: data-volume
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: pvc-mqtt
        - configMap:
            name: cm-mosquitto-conf
          name: config-file
