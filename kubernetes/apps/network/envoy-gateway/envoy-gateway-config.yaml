---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-gateway-config
  namespace: network
data:
  envoy-gateway.yaml: |
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: EnvoyGateway
    provider:
      type: Kubernetes
    gateway:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
    logging:
      level:
        default: info
    extensionApis:
      enableBackend: true
    kubernetes:
      rateLimitDeployment:
        container:
          image: docker.io/envoyproxy/ratelimit:99d85510
        patch:
          type: StrategicMerge
          value:
            spec:
              template:
                spec:
                  containers:
                  - imagePullPolicy: IfNotPresent
                    name: envoy-ratelimit
      shutdownManager:
        image: docker.io/envoyproxy/gateway:v1.6.0
