---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "gitlab-be-production"
spec:
  dnsNames:
    - "gitlab.be"
    - "*.gitlab.be"
  duration: 160h
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
  secretName: "gitlab-be-production-tls"
  usages:
    - digital signature
