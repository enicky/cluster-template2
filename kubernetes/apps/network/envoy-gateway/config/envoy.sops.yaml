  gatewayClassName: envoy
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: external.gitlab.be
      lbipam.cilium.io/ips: 192.168.1.23
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
