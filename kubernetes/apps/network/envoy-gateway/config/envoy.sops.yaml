apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-external
  annotations:
    external-dns.alpha.kubernetes.io/target: external.gitlab.be
spec:
  gatewayClassName: envoy
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: external.gitlab.be
      lbipam.cilium.io/ips: 192.168.1.23
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
