apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: unifi
  namespace: home
spec:
  parentRefs:
  - name: envoy-external
    namespace: network
    sectionName: https
  hostnames:
  - unifi.gitlab.be
  rules:
  - backendRefs:
    - name: unifi-tls-backend
      group: gateway.envoyproxy.io
      kind: Backend


